[build]
  base = "frontend"
  command = "npm install --legacy-peer-deps && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — all routes serve index.html
[[redirects]]
  from = "/api/*"
  to = "https://YOUR-HF-SPACE.hf.space/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/healthz"
  to = "https://YOUR-HF-SPACE.hf.space/healthz"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
